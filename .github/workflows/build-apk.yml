name: Build CanvasOS APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-native:
    name: Build Native Library (aarch64)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Android NDK
        uses: nttld/setup-ndk@v1
        id: setup-ndk
        with:
          ndk-version: r27c

      - name: Build native binaries
        env:
          NDK_HOME: ${{ steps.setup-ndk.outputs.ndk-path }}
        run: |
          CC="${NDK_HOME}/toolchains/llvm/prebuilt/linux-x86_64/bin/aarch64-linux-android26-clang"
          cd native/build

          echo "=== Building libcanvasos.so ==="
          $CC -shared -fPIC -o libcanvasos.so \
            -Wall -std=c11 -O2 -Iinclude \
            src/engine.c src/scan_ringmh.c src/active_set.c src/canvasfs.c \
            src/canvasfs_bpage.c src/scheduler.c src/control_region.c src/engine_time.c \
            src/gate_ops.c src/canvasos_opcodes.c src/cvp_io.c src/engine_ctx.c \
            src/lane_exec.c src/bpage_table.c src/inject.c src/wh_io.c \
            src/canvas_lane.c src/canvas_merge.c src/canvas_multiverse.c src/canvas_branch.c \
            src/canvas_bh_compress.c src/workers.c src/canvas_gpu_stub.c src/sjptl_parser.c \
            src/tervas/tervas_core.c src/tervas/tervas_bridge.c src/tervas/tervas_cli.c \
            src/tervas/tervas_projection.c src/tervas/tervas_render_ascii.c \
            src/proc.c src/signal.c src/mprotect.c src/pipe.c src/syscall.c src/detmode.c \
            src/timewarp.c src/vm.c src/pixelcode.c src/vm_runtime_bridge.c \
            src/fd.c src/path.c src/user.c src/utils.c src/shell.c \
            src/fd_canvas_bridge.c src/path_virtual.c src/syscall_bindings.c \
            src/pixel_loader.c src/timeline.c src/livedemo.c \
            src/canvasos_gui.c src/gui_engine_bridge.c \
            src/sj_stream_packet.c src/permission.c

          echo "=== Building canvasos_launcher ==="
          $CC -o canvasos_launcher \
            -Wall -std=c11 -O2 -Iinclude \
            src/canvasos_launcher.c \
            src/tervas/tervas_core.c src/tervas/tervas_bridge.c src/tervas/tervas_cli.c \
            src/tervas/tervas_projection.c src/tervas/tervas_render_ascii.c \
            src/engine.c src/scan_ringmh.c src/active_set.c src/canvasfs.c \
            src/canvasfs_bpage.c src/scheduler.c src/control_region.c src/engine_time.c \
            src/gate_ops.c src/canvasos_opcodes.c src/cvp_io.c src/engine_ctx.c \
            src/lane_exec.c src/bpage_table.c src/inject.c src/wh_io.c \
            src/canvas_lane.c src/canvas_merge.c src/canvas_multiverse.c src/canvas_branch.c \
            src/canvas_bh_compress.c src/workers.c src/canvas_gpu_stub.c src/sjptl_parser.c \
            src/proc.c src/signal.c src/mprotect.c src/pipe.c src/syscall.c src/detmode.c \
            src/timewarp.c src/vm.c src/pixelcode.c src/vm_runtime_bridge.c \
            src/fd.c src/path.c src/user.c src/utils.c src/shell.c \
            src/fd_canvas_bridge.c src/path_virtual.c src/syscall_bindings.c \
            src/pixel_loader.c src/timeline.c src/livedemo.c \
            src/canvasos_gui.c src/gui_engine_bridge.c \
            src/sj_stream_packet.c src/permission.c

          ls -la libcanvasos.so canvasos_launcher

      - name: Stage binaries
        run: |
          mkdir -p staging
          cp native/build/libcanvasos.so staging/
          cp native/build/canvasos_launcher staging/

      - uses: actions/upload-artifact@v4
        with:
          name: native-binaries
          path: staging/

  build-apk:
    name: Build Android APK
    needs: build-native
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: native-binaries
          path: native-out

      - name: Place native binaries
        run: |
          mkdir -p app/src/main/jniLibs/arm64-v8a
          mkdir -p app/src/main/assets
          ls -laR native-out/
          cp native-out/libcanvasos.so app/src/main/jniLibs/arm64-v8a/
          cp native-out/canvasos_launcher app/src/main/assets/
          chmod +x app/src/main/assets/canvasos_launcher
          ls -la app/src/main/jniLibs/arm64-v8a/ app/src/main/assets/

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Generate Gradle Wrapper
        run: |
          gradle wrapper --gradle-version 8.9

      - name: Build Debug APK
        run: ./gradlew assembleDebug --no-daemon

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: canvasos-debug-apk
          path: app/build/outputs/apk/debug/*.apk

  run-tests:
    name: Run CanvasOS Native Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build and run tests (x86_64)
        run: |
          cd native/build
          make test_all CC=gcc 2>&1
